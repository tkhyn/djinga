### BUILDOUT CONFIG FILE ###

[buildout]
# DIRECTORIES
bin-directory = bin
parts-directory = bin/parts
develop-eggs-directory = bin/dev-eggs

# PARTS
parts =
    python
    tests
    coverage

# EGGS common to all parts
eggs =
    Django
    Jinja2

# specify a version for ANY egg used :
#  - to ensure repeatability
#  - to make the buildout script run faster
#    (does not need to check for newer versions)
# check the output for picked versions

show-picked-versions = true


# PARTS DEFINITIONS

# the tests runner
[tests]
recipe = djangorecipebook:test
eggs =
    ${buildout:eggs}
workingdir = tests

# coverage
[coverage]
<= tests
eggs =
    coverage
    ${tests:eggs}
args = --with-coverage

# the python interpreter for the buildout environment
[python]
recipe = zc.recipe.egg:script
eggs = ${tests:eggs}
interpreter = python
extra-paths = ${buildout:directory}


[versions]
python = 3.12

# RECIPES
zc.recipe.egg = 4.0.0
djangorecipebook = 2.0

# DEPENDENCIES
asgiref = 3.11.1
colorama = 0.4.6
Django = 6.0.3
iniconfig = 2.3.0
Jinja2 = 3.1.6
pluggy = 1.6.0
Pygments = 2.19.2
sqlparse = 0.5.5

# django requires
tzdata = 2025.3

# jinja2 requires
MarkupSafe = 3.0.3

# TESTS
pytest = 9.0.2
pytest-django = 4.12.0
coverage = 7.13.4
