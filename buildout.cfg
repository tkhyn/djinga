### BUILDOUT CONFIG FILE ###

[buildout]
# DIRECTORIES
bin-directory = bin
parts-directory = bin/parts
develop-eggs-directory = bin/dev-eggs

# PARTS
parts =
    python
    tests
    coverage

# EGGS common to all parts
eggs =
    Django
    jinja2

# specify a version for ANY egg used :
#  - to ensure repeatability
#  - to make the buildout script run faster
#    (does not need to check for newer versions)
# check the output for picked versions

show-picked-versions = true


# PARTS DEFINITIONS

# the tests runner
[tests]
recipe = djangorecipebook:test
eggs =
    ${buildout:eggs}
workingdir = tests

# coverage
[coverage]
<= tests
eggs =
    coverage
    ${tests:eggs}
args = --with-coverage

# the python interpreter for the buildout environment
[python]
recipe = zc.recipe.egg:script
eggs = ${tests:eggs}
interpreter = python
extra-paths = ${buildout:directory}


[versions]
python = 3.6
zc.buildout = 2.10.0

# RECIPES
zc.recipe.egg = 2.0.5
djangorecipebook = 1.6

# DEPENDENCIES
Django = 2.0
jinja2 = 2.10

# django requires
pytz = 2017.3

# jinja2 requires
markupsafe = 1.0

# TESTS
pytest = 8.4.2
pytest-django = 4.11.1
coverage = 7.11.0

